<!doctype html>
<html lang="en">
   <head>

      <title>HTML Head</title>

      <style>
         h1 {
            color: red;
            font-size: 22px;
            font-family: 'Lucida Sans', 'Lucida Sans Regular', 'Lucida Grande', 'Lucida Sans Unicode', Geneva, Verdana, sans-serif;
         }
      </style>

      <link rel="stylesheet" href="style.css">

      <!--
      ব্যবহৃত অক্ষর সেটটি সংজ্ঞায়িত করুন:
      <meta charset="UTF-8">

      সার্চ ইঞ্জিনের জন্য কীওয়ার্ড সংজ্ঞায়িত করুন:
      <meta name="keywords" content="HTML, CSS, JavaScript">

      আপনার ওয়েব পৃষ্ঠার একটি বর্ণনা সংজ্ঞায়িত করুন:
      <meta name="description" content="Free Web tutorials">
      
      একটি পৃষ্ঠার লেখককে সংজ্ঞায়িত করুন:
      <meta name="author" content="John Doe">

      প্রতি 30 সেকেন্ডে ডকুমেন্ট রিফ্রেশ করুন:
      <meta http-equiv="refresh" content="30">

      আপনার ওয়েবসাইটকে সকল ডিভাইসে সুন্দর দেখানোর জন্য ভিউপোর্ট সেট করা:
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      -->

      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <meta name="keywords" content="HTML head">
      <meta name="description" content="Free HTML tutorials">
      <meta http-equiv="refresh" content="30">

   </head>
   <body>

      <!--
      The HTML <head> element is a container for the following elements: <title>, <style>, <meta>, <link>, <script>, and <base>.

      The HTML <head> Element

      *The <head> element is a container for metadata (data about data) and is placed between the <html> tag and the <body> tag.
      *HTML metadata is data about the HTML document. Metadata is not displayed on the page.
      *Metadata typically define the document title, character set, styles, scripts, and other meta information.

      The HTML <title> Element

      *The <title> element defines the title of the document. The title must be text-only, and it is shown in the browser's title bar or in the page's tab.
      *The <title> element is required in HTML documents!
      *The content of a page title is very important for search engine optimization (SEO)! The page title is used by search engine algorithms to decide the order when listing pages in search results.

      The <title> element:

      **defines a title in the browser toolbar
      **provides a title for the page when it is added to favorites
      **displays a title for the page in search engine-results
      So, try to make the title as accurate and meaningful as possible!

      The HTML <style> Element

      *The <style> element is used to define style information for a single HTML page:

      The HTML <link> Element

      *The <link> element defines the relationship between the current document and an external resource.
      *The <link> tag is most often used to link to external style sheets:

      The HTML <meta> Element

      *The <meta> element is typically used to specify the character set, page description, keywords, author of the document, and viewport settings.
      *The metadata will not be displayed on the page, but is used by browsers (how to display content or reload page), by search engines (keywords), and other web services.

      The HTML <base> Element

      *The <base> element specifies the base URL and/or target for all relative URLs in a page.
      *The <base> tag must have either an href or a target attribute present, or both.
      *There can only be one single <base> element in a document!
      -->

      <div class="main-div">
         <h1>This is a heading</h1>
         <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Incidunt itaque odit, impedit laudantium facere enim eligendi recusandae soluta nobis. Doloribus ipsum hic nostrum modi sapiente eveniet aut illum sint commodi!</p>
      </div>
      
   </body>
</html>
