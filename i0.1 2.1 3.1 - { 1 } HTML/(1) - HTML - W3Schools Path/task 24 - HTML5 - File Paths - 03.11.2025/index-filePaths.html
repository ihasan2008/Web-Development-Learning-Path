<!doctype html>
<html lang="en">
   <head>
      <title>HTML File Paths</title>
   </head>
   <body>

      <!--
      HTML File Paths

      A file path describes the location of a file in a web site's folder structure.
      File paths are used when linking to external files, like:

      *Web pages
      *Images
      *Style sheets
      *JavaScripts
      -->


      <!--
      Absolute File Paths

      *An absolute file path is the full URL to a file:
      -->

      <img src="https://www.w3schools.com/images/picture.jpg" alt="Mountain">
      <a href="https://www.youtube.com/ihasan2008">Youtube</a>

      <!--
      Relative File Paths

      *A relative file path points to a file relative to the current page.
      *In the following example, the file path points to a file in the images folder located at the root of the current website:
      -->

      <img src="../task 13 - HTML5 - Images - 27.10.2025/photo1.png" alt="Natural Photo1" width="220">

      <!--
      * <img src="picture.jpg">	"picture.jpg" ফাইলটি বর্তমান পৃষ্ঠার মতো একই ফোল্ডারে অবস্থিত।
      * <img src="images/picture.jpg">	"picture.jpg" ফাইলটি বর্তমান ফোল্ডারের ইমেজ ফোল্ডারে অবস্থিত।
      * <img src="/images/picture.jpg">	"picture.jpg" ফাইলটি বর্তমান ওয়েবের মূলে থাকা চিত্র ফোল্ডারে অবস্থিত।
      * <img src="../picture.jpg">	"picture.jpg" ফাইলটি বর্তমান ফোল্ডার থেকে এক স্তর উপরে ফোল্ডারে অবস্থিত।
      -->
      
   </body>
</html>
