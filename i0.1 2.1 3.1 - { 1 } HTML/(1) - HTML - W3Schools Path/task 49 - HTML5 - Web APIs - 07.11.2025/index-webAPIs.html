   HTML - একটি ওয়েব API কী?
   একটি ওয়েব এপিআই একজন ডেভেলপারের স্বপ্ন।

   এটি ব্রাউজারের কার্যকারিতা প্রসারিত করতে পারে
   এটি জটিল ফাংশনগুলিকে ব্যাপকভাবে সরল করতে পারে
   এটি জটিল কোডের সহজ বাক্য গঠন প্রদান করতে পারে
   ওয়েব এপিআই কী?
   API হল A application Programming Interface এর পূর্ণরূপ। API হল এক ধরণের ইন্টারফেস যার মধ্যে কিছু ফাংশন এবং সাবরুটিন থাকে যা প্রোগ্রামারদের একটি অ্যাপ্লিকেশন, অপারেটিং সিস্টেম বা অন্যান্য পরিষেবার নির্দিষ্ট বৈশিষ্ট্য বা ডেটা অ্যাক্সেস করার অনুমতি দেয়।

   ওয়েব এপিআই হলো ওয়েবের জন্য একটি অ্যাপ্লিকেশন প্রোগ্রামিং ইন্টারফেস।

   HTML API গুলি
   জটিল ক্রিয়াকলাপ সমর্থন করার জন্য এবং ডেটা অ্যাক্সেসে সহায়তা করার জন্য সমস্ত ব্রাউজারে অন্তর্নির্মিত ওয়েব API-এর একটি সেট থাকে।

   এখানে কিছু প্রধান HTML5 API গুলি দেওয়া হল:

   ১. জিওলোকেশন এপিআই - এই এপিআই ব্যবহারকারীর বর্তমান অবস্থান (অক্ষাংশ এবং দ্রাঘিমাংশ সহ) অ্যাক্সেস করতে ব্যবহৃত হয়।
   ২. ড্র্যাগ অ্যান্ড ড্রপ এপিআই - এই এপিআই আপনাকে ব্রাউজারে ড্র্যাগ-এন্ড-ড্রপ বৈশিষ্ট্যগুলি ব্যবহার করতে সক্ষম করে।
   ৩. ওয়েব স্টোরেজ এপিআই - এই এপিআইতে ব্রাউজারগুলিকে কী/মান জোড়া সংরক্ষণ করার সুযোগ দেওয়ার ব্যবস্থা রয়েছে (কুকিজের চেয়ে আরও স্বজ্ঞাত উপায়ে)।
   ৪. ওয়েব ওয়ার্কার্স এপিআই - এই এপিআই একটি জাভাস্ক্রিপ্টকে ব্যাকগ্রাউন্ডে চালানোর অনুমতি দেয়, পৃষ্ঠার কর্মক্ষমতা প্রভাবিত না করে। ব্যবহারকারীরা যা খুশি তাই করতে পারেন: ক্লিক করা, জিনিস নির্বাচন করা ইত্যাদি, যখন ওয়েব ওয়ার্কার ব্যাকগ্রাউন্ডে চলে।
   ৫. সার্ভার-প্রেরিত ইভেন্টস API - এই API একটি ওয়েব পৃষ্ঠাকে স্বয়ংক্রিয়ভাবে একটি সার্ভার থেকে আপডেট পেতে দেয়।
   ৬. ক্যানভাস এপিআই - এই এপিআই আপনাকে জাভাস্ক্রিপ্টের মাধ্যমে তাৎক্ষণিকভাবে গ্রাফিক্স আঁকতে দেয়।

   HTML API ব্যবহারের বিষয়ে নোটস
   HTML API বাস্তবায়নের সময়, আপনার সর্বদা উচিত:

   ব্রাউজার সক্ষমতা পরীক্ষা করুন - সর্বদা পরীক্ষা করুন যে লক্ষ্য ব্রাউজারগুলি API সমর্থন করে কিনা। যদি কোনও ব্রাউজার এটি সমর্থন না করে তবে সর্বদা চালানোর জন্য স্ক্রিপ্ট বা বার্তা যুক্ত করুন।

   শক্তিশালী ত্রুটি পরিচালনা যোগ করুন - এমন পরিস্থিতিতে যেখানে একটি API প্রত্যাশা অনুযায়ী কাজ নাও করতে পারে, সেক্ষেত্রে শক্তিশালী ত্রুটি পরিচালনা যোগ করুন, যাতে ব্যবহারকারীর অভিজ্ঞতা নির্বিঘ্নে নিশ্চিত করা যায়।

   ব্যবহারকারীর অনুমতির জন্য অনুরোধ করুন - জিওলোকেশন এপিআই (যা ব্যবহারকারীর ভৌগোলিক অবস্থান অ্যাক্সেস করবে) এর মতো সংবেদনশীল ডেটা অ্যাক্সেস করে এমন কোনও এপিআই ব্যবহার করার সময়, এগিয়ে যাওয়ার আগে সর্বদা ব্যবহারকারীর সম্মতির জন্য অনুরোধ করুন।

   তৃতীয় পক্ষের API গুলি
   তৃতীয় পক্ষের API গুলি আপনার ব্রাউজারে অন্তর্নির্মিত নয়।

   এই API গুলি ব্যবহার করতে, আপনাকে ওয়েব থেকে কোডটি ডাউনলোড করতে হবে।

   উদাহরণ:

   YouTube API - আপনাকে একটি ওয়েবসাইটে ভিডিও প্রদর্শনের অনুমতি দেয়।
   টুইটার এপিআই - আপনাকে একটি ওয়েবসাইটে টুইট প্রদর্শনের অনুমতি দেয়।
   ফেসবুক এপিআই - আপনাকে একটি ওয়েবসাইটে ফেসবুক তথ্য প্রদর্শন করতে দেয়।
