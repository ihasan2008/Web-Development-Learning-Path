<body>
   
   <!--
   HTML জিওলোকেশন API

   ব্যবহারকারীর বর্তমান অবস্থান পেতে জিওলোকেশন API ব্যবহার করা হয়।

   ব্যবহারকারীর অবস্থান নির্ণয় করুন
   ব্যবহারকারীর বর্তমান অবস্থান অ্যাক্সেস করতে জিওলোকেশন API ব্যবহার করা হয়।

   যেহেতু এটি গোপনীয়তা লঙ্ঘন করতে পারে, তাই ব্যবহারকারীর অনুমোদন না পেলে অবস্থানটি উপলব্ধ হবে না।

   HTML জিওলোকেশন API ব্যবহার করা হচ্ছে
   
   জিওলোকেশন API-তে একটি কলের মাধ্যমে অ্যাক্সেস করা হয় navigator.geolocation। এর ফলে ব্রাউজার ব্যবহারকারীর কাছে তাদের অবস্থান ডেটা অ্যাক্সেস করার অনুমতি চাইবে। ব্যবহারকারী যদি সম্মত হন, তাহলে ব্রাউজার এই তথ্য অ্যাক্সেস করার জন্য ডিভাইসে উপলব্ধ সেরা কার্যকারিতা অনুসন্ধান করবে (উদাহরণস্বরূপ GPS)।

   getCurrentPosition()ব্যবহারকারীর বর্তমান অবস্থান ফেরত দিতে পদ্ধতিটি ব্যবহার করা হয় ।
   -->

   <h1>HTML Geolocation</h1>
   <p>Click the button to get your coordinates.</p>

   <button onclick="getLocation()">Try It</button>

   <p id="demo"></p>

   <script>
      const x = document.getElementById("demo");

      function getLocation() {
         if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(success, error);
         } else { 
            x.innerHTML = "Geolocation is not supported by this browser.";
         }
      }

      function success(position) {
         x.innerHTML = "Latitude: " + position.coords.latitude + 
         "<br>Longitude: " + position.coords.longitude;
      }

      function error() {
         alert("Sorry, no position available.");
      }
   </script>

</body>
