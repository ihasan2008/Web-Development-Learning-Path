<!doctype html>
<html lang="en">
   <head>
      <title>HTML JavaScript</title>
   </head>
   <body>

      <button onclick="clickNow()">Click Now</button>
      <div id="shows"></div>

      <hr>

      <div id="div-demo"></div>

      <!--
      The HTML <script> Tag

      *The HTML <script> tag is used to define a client-side script (JavaScript).
      *The <script> element either contains script statements, or it points to an external script file through the src attribute.
      *Common uses for JavaScript are image manipulation, form validation, and dynamic changes of content.
      *To select an HTML element, JavaScript most often uses the document.getElementById() method.
      *This JavaScript example writes "Hello JavaScript!" into an HTML element with id="demo":
      -->

      <script>
         function clickNow() {
            let i = true;
            if (i == true) {
               document.getElementById('shows').innerHTML = "<h1>This is a heading</h1>";
            }
         }

         document.getElementById('div-demo').innerHTML = "<h1>Lorem ipsum dolor sit amet.</h1> <p>Lorem ipsum dolor sit amet consectetur, adipisicing elit. Quis, labore rerum odit corporis dolores earum nemo iusto eum provident veniam cupiditate, iure temporibus totam reprehenderit, quae omnis. Ut, a doloribus!</p>";

         document.getElementById('div-demo').style.backgroundColor = "green";
         document.getElementById("div-demo").style.padding = "25px";
         document.getElementById("div-demo").style.color = "red";
      </script>
      
      <noscript>Sorry, your browser does not support JavaScript!</noscript>
      
   </body>
</html>
