<!DOCTYPE html>
<html lang="en">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <meta http-equiv="refresh" content="30">
   <title>HTML Form Elements</title>
</head>
<body>
   
   <!--
   The HTML <form> Elements

   The HTML <form> element can contain one or more of the following form elements:

   <input>
   <label>
   <select>
   <textarea>
   <button>
   <fieldset>
   <legend>
   <datalist>
   <output>
   <option>
   <optgroup>
   -->

   <label for="fname">Full Name :</label>
   <input type="text" id="fname" name="fname" placeholder="Full Name">

   <label>choose a location :</label>
   <select id="location" name="location" size="1">
      <option value="amtali">Amtali</option>
      <option value="barguna">Barguna</option>
      <option value="taltoli">Taltoli</option>
      <option value="badda">Badda</option>
      <option value="gulshan1">Gulshan 1</option>
   </select>

   <label for="cars">Choose a car:</label>
   <select id="cars" name="cars" size="4" multiple>
      <option value="volvo">Volvo</option>
      <option value="saab">Saab</option>
      <option value="fiat">Fiat</option>
      <option value="audi">Audi</option>
   </select>

   <textarea name="message" id="message-area" rows="5" cols="15">
      The cat was playing in the garden.
   </textarea>

   <textarea name="message" style="width: 200px; height: 300px;">
      The cat was playing in the garden.
   </textarea>

   <button type="button" onclick="alert('Hello World!')">Click Me!</button>

   <form action="#">
      <fieldset>
         <legend>Personalia:</legend>
            <label for="fname">First name:</label><br>
            <input type="text" id="fname" name="fname" value="Ha"><br>
            <label for="lname">Last name:</label><br>
            <input type="text" id="lname" name="lname" value="SaN"><br><br>
            <input type="submit" value="Submit">
      </fieldset>
   </form>

   <form action="#">
      <input list="browsers">
      <datalist id="browsers">
         <option value="Edge">
         <option value="Firefox">
         <option value="Chrome">
         <option value="Opera">
         <option value="Safari">
      </datalist>
   </form>

   <form action="#"
      oninput="x.value=parseInt(a.value)+parseInt(b.value)">
      0
      <input type="range"  id="a" name="a" value="50">
      100 +
      <input type="number" id="b" name="b" value="50">
      =
      <output name="x" for="a b"></output>
      <br><br>
      <input type="submit">
   </form>

</body>
</html>
