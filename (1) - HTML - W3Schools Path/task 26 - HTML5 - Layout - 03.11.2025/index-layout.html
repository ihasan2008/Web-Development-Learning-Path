<!doctype html>
<html lang="en">
   <head>
      <title>HTML Layout</title>
   </head>
   <body>

      <!--
      HTML লেআউট এলিমেন্ট
      
      HTML-এ বেশ কিছু শব্দার্থিক উপাদান রয়েছে যা একটি ওয়েব পৃষ্ঠার বিভিন্ন অংশকে সংজ্ঞায়িত করে:

      HTML5 শব্দার্থিক উপাদান	
      <header>- একটি ডকুমেন্ট বা বিভাগের জন্য একটি হেডার সংজ্ঞায়িত করে
      <nav>- নেভিগেশন লিঙ্কের একটি সেট সংজ্ঞায়িত করে
      <section>- একটি নথিতে একটি বিভাগ সংজ্ঞায়িত করে
      <article>- স্বাধীন, স্বয়ংসম্পূর্ণ বিষয়বস্তু সংজ্ঞায়িত করে
      <aside>- কন্টেন্ট বাদে কন্টেন্ট সংজ্ঞায়িত করে (যেমন সাইডবার)
      <footer>- একটি ডকুমেন্ট বা বিভাগের জন্য একটি ফুটার সংজ্ঞায়িত করে
      <details>- অতিরিক্ত বিবরণ সংজ্ঞায়িত করে যা ব্যবহারকারী চাহিদা অনুযায়ী খুলতে এবং বন্ধ করতে পারে
      <summary><details>- উপাদানটির জন্য একটি শিরোনাম সংজ্ঞায়িত করে
      -->
      
   </body>
</html>
