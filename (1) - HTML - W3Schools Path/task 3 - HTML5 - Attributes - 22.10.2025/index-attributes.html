<!doctype html>
<html lang="en">
   <head>
      <title>HTML Attributes</title>
   </head>
   <body>
      
      <!--
         HTML Attributes
            *All HTML elements can have attributes
            *Attributes provide additional information about elements
            *Attributes are always specified in the start tag
            *Attributes usually come in name/value pairs like: name="value"
      -->
      
      <!-- Attributes Examples -->

      <a href="https://www.facebook.com/ihasan2008">Facebook Link</a> <!-- href="" is attribute -->
      <img src="" alt=""> <!-- src="" & alt="" is attribute -->
      <p style="color: red; font-size: 14px;">this is a paragraph</p> <!-- style="color: red; font-size: 14px;" is attribute -->
      <!-- <html lang="en"></html> html tag in lang="en" attribute -->
      <p title="Hyper Text Markup Language">HTML</p> <!-- title="" is attribute -->

   </body>
</html>
